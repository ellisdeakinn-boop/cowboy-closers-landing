<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cowboy Closers</title>
  <link rel="icon" type="image/jpeg" href="./favicon.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #ffffff;
      --dark: #0a0a0a;
      --muted: #777777;
      --dim: #b0b0b0;
      --border: #e5e5e5;
    }
    html, body { height: 100%; }
    body {
      background: var(--white);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dark);
      text-decoration: none;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 32px 0;
    }
    .subheading {
      font-size: 15px;
      color: var(--muted);
      font-style: italic;
      margin-top: -32px;
      margin-bottom: 40px;
      max-width: 500px;
      text-align: center;
      line-height: 1.6;
    }

    .headline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: clamp(22px, 4vw, 40px);
      letter-spacing: -0.025em;
      text-align: center;
      max-width: 640px;
      margin-bottom: 48px;
      line-height: 1.2;
    }
    .form-wrap {
      width: 100%;
      max-width: 720px;
    }

    /* ── FOOTER ── */
    footer {
      padding: 32px;
      text-align: center;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    footer p { font-size: 13px; color: var(--dim); }
    footer a { color: var(--dim); text-decoration: none; }
    footer a:hover { color: var(--dark); }

    @media (max-width: 600px) {
      nav { padding: 16px 24px; }
      main { padding: 40px 20px 0; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="./" class="logo">Cowboy Closers</a>
  </nav>

  <main>
    <h1 class="headline">Just answer these 3 short questions before we speak.</h1>
    <p class="subheading">(we do this because only people who are serious about changing will fill this out)</p>
    <div class="form-wrap">
      <div data-tf-live="01KNK30D9WK791MASG817S9C72"></div>
      <script src="//embed.typeform.com/next/embed.js"></script>
    </div>
  </main>

  <footer>
    <p>© 2025 Cowboy Closers. All rights reserved. &nbsp;|&nbsp; <a href="./privacy-policy.html">Privacy Policy</a> &nbsp;|&nbsp; <a href="./terms.html">Terms</a></p>
  </footer>

</body>
</html>
