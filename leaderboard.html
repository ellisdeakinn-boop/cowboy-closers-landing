<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cowboy Closers — Weekly Leaderboard</title>
  <link rel="icon" href="favicon.jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0b08;
      color: #e8dcc8;
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at top, #1a1206 0%, #0d0b08 60%);
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 56px 24px 40px;
      position: relative;
      border-bottom: 1px solid #2e2414;
    }

    .header-star {
      font-size: 2rem;
      color: #c9a84c;
      display: block;
      margin-bottom: 12px;
      letter-spacing: 0.3em;
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #c9a84c;
      text-shadow: 0 0 40px rgba(201,168,76,0.3);
    }

    .header-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 12px 0;
      color: #4a3820;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
    }

    .header-divider::before,
    .header-divider::after {
      content: '';
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, #4a3820);
    }

    .header-divider::after {
      background: linear-gradient(to left, transparent, #4a3820);
    }

    header p {
      font-size: 0.8rem;
      color: #7a6a50;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* ── WEEK SELECTOR ── */
    .week-selector {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 32px 24px 0;
    }

    .week-btn {
      background: #120f08;
      border: 1px solid #2e2414;
      color: #7a6a50;
      padding: 8px 18px;
      border-radius: 2px;
      cursor: pointer;
      font-family: 'EB Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }

    .week-btn:hover, .week-btn.active {
      background: #c9a84c;
      border-color: #c9a84c;
      color: #0d0b08;
    }

    /* ── SORT BAR ── */
    .sort-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 16px 24px 0;
    }

    .sort-label {
      font-size: 0.7rem;
      color: #4a3820;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      align-self: center;
      margin-right: 4px;
    }

    .sort-btn {
      background: transparent;
      border: 1px solid #2e2414;
      color: #7a6a50;
      padding: 5px 14px;
      border-radius: 2px;
      cursor: pointer;
      font-family: 'EB Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      transition: all 0.2s;
    }

    .sort-btn:hover, .sort-btn.active {
      border-color: #c9a84c;
      color: #c9a84c;
    }

    /* ── CONTAINER ── */
    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 36px 24px 80px;
    }

    .loading {
      text-align: center;
      color: #4a3820;
      padding: 80px;
      font-size: 1rem;
      letter-spacing: 0.1em;
      font-style: italic;
    }

    /* ── LEADERBOARD ── */
    .leaderboard {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .entry {
      background: #100e09;
      border: 1px solid #2e2414;
      border-radius: 2px;
      padding: 18px 24px;
      display: grid;
      grid-template-columns: 56px 1fr repeat(4, auto);
      align-items: center;
      gap: 20px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .entry::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #2e2414;
      transition: background 0.2s;
    }

    .entry:hover { border-color: #3e3020; }
    .entry:hover::before { background: #4a3820; }

    .entry.gold { border-color: #c9a84c; background: #140f07; }
    .entry.gold::before { background: #c9a84c; }
    .entry.silver { border-color: #9a9a9a; }
    .entry.silver::before { background: #9a9a9a; }
    .entry.bronze { border-color: #9b6a3b; }
    .entry.bronze::before { background: #9b6a3b; }

    .rank {
      text-align: center;
    }

    .rank-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #2e2414;
      line-height: 1;
    }

    .rank-icon {
      font-size: 1rem;
      display: block;
      margin-top: 2px;
    }

    .entry.gold .rank-num { color: #c9a84c; }
    .entry.silver .rank-num { color: #9a9a9a; }
    .entry.bronze .rank-num { color: #9b6a3b; }

    .name-block {}

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
      color: #e8dcc8;
    }

    .entry.gold .name { color: #c9a84c; }

    .name-tag {
      font-size: 0.7rem;
      color: #4a3820;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .stat {
      text-align: right;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: #e8dcc8;
    }

    .stat-label {
      font-size: 0.62rem;
      color: #4a3820;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ── TOP 3 SPECIAL ── */
    .entry.gold .stat-value { color: #c9a84c; }

    /* ── EMPTY ── */
    .empty {
      text-align: center;
      color: #4a3820;
      padding: 80px;
      font-size: 1rem;
      letter-spacing: 0.05em;
      font-style: italic;
    }

    /* ── SUBMIT ── */
    .submit-section {
      text-align: center;
      margin-top: 56px;
      padding-top: 40px;
      border-top: 1px solid #2e2414;
    }

    .submit-section .ornament {
      color: #4a3820;
      letter-spacing: 0.3em;
      font-size: 0.8rem;
      margin-bottom: 16px;
    }

    .submit-section h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: #e8dcc8;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .submit-section p {
      font-size: 0.8rem;
      color: #4a3820;
      letter-spacing: 0.06em;
      margin-bottom: 24px;
      font-style: italic;
    }

    .submit-btn {
      display: inline-block;
      background: #c9a84c;
      color: #0d0b08;
      text-decoration: none;
      padding: 14px 40px;
      border-radius: 2px;
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .submit-btn:hover {
      background: #e0c06a;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      color: #2e2414;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      header h1 { font-size: 2rem; }

      .entry {
        grid-template-columns: 44px 1fr;
        row-gap: 12px;
      }

      .stats-mobile {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        border-top: 1px solid #2e2414;
        padding-top: 12px;
      }

      .stat { text-align: left; }
    }
  </style>
</head>
<body>

<header>
  <span class="header-star">✦ ✦ ✦</span>
  <h1>Cowboy Closers</h1>
  <div class="header-divider">★</div>
  <p>Weekly Leaderboard</p>
</header>

<div class="week-selector" id="weekSelector"></div>

<div class="sort-bar">
  <span class="sort-label">Rank by</span>
  <button class="sort-btn active" onclick="setSort('Revenue Generated', this)">Revenue</button>
  <button class="sort-btn" onclick="setSort('Cash Collected', this)">Cash Collected</button>
  <button class="sort-btn" onclick="setSort('Close Rate %', this)">Close Rate</button>
  <button class="sort-btn" onclick="setSort('Calls Taken', this)">Calls Taken</button>
</div>

<div class="container">
  <div class="loading" id="loading">Saddling up...</div>
  <div class="leaderboard" id="leaderboard"></div>
  <div class="empty" id="empty" style="display:none">No submissions for this week yet. Be the first.</div>

  <div class="submit-section">
    <div class="ornament">✦ ✦ ✦</div>
    <h3>Submit Your Numbers</h3>
    <p>Submit once per week. Numbers update in real time.</p>
    <a class="submit-btn" href="https://airtable.com/appGZi0D2Rput5ktq/pag2oqH768m06nN49/form" target="_blank">Post Your Week</a>
  </div>
</div>

<footer>Cowboy Closers &mdash; Built by Elevate Operations</footer>

<script>
  const BASE_ID = 'appGZi0D2Rput5ktq';
  const TABLE_ID = 'tblVthujZdhsOR6uO';
  const API_KEY = 'patlnfolmHFdosqKG.13376efc400f77702df82bd6a4e6a79f399e1611feffc186ce4c6341b7e06673';

  let allRecords = [];
  let currentWeek = '';
  let currentSort = 'Revenue Generated';

  const RANK_ICONS = { 0: '🤠', 1: '🥈', 2: '🥉' };

  async function fetchRecords() {
    const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?sort[0][field]=Submitted At&sort[0][direction]=desc`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${API_KEY}` } });
    const data = await res.json();
    return data.records || [];
  }

  function getWeeks(records) {
    const weeks = [...new Set(records.map(r => r.fields['Week']).filter(Boolean))];
    return weeks.sort((a, b) => b.localeCompare(a));
  }

  function renderWeekButtons(weeks) {
    const container = document.getElementById('weekSelector');
    container.innerHTML = '';
    weeks.forEach((week, i) => {
      const btn = document.createElement('button');
      btn.className = 'week-btn' + (i === 0 ? ' active' : '');
      btn.textContent = week;
      btn.onclick = () => {
        document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentWeek = week;
        renderLeaderboard();
      };
      container.appendChild(btn);
    });
  }

  function setSort(field, el) {
    currentSort = field;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderLeaderboard();
  }

  function fmt(val, type) {
    if (val === undefined || val === null) return '—';
    if (type === 'currency') return '£' + Number(val).toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    if (type === 'percent') return Number(val).toFixed(1) + '%';
    return Number(val).toLocaleString();
  }

  function renderLeaderboard() {
    const leaderboard = document.getElementById('leaderboard');
    const empty = document.getElementById('empty');

    let filtered = allRecords.filter(r => r.fields['Week'] === currentWeek);
    filtered.sort((a, b) => (b.fields[currentSort] || 0) - (a.fields[currentSort] || 0));

    leaderboard.innerHTML = '';

    if (filtered.length === 0) {
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';

    filtered.forEach((record, i) => {
      const f = record.fields;
      const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const icon = RANK_ICONS[i] || '';

      const entry = document.createElement('div');
      entry.className = `entry ${rankClass}`;
      entry.innerHTML = `
        <div class="rank">
          <div class="rank-num">${i + 1}</div>
          ${icon ? `<span class="rank-icon">${icon}</span>` : ''}
        </div>
        <div class="name-block">
          <div class="name">${f['Name'] || 'Anonymous'}</div>
          <div class="name-tag">Cowboy Closer</div>
        </div>
        <div class="stat">
          <div class="stat-value">${fmt(f['Revenue Generated'], 'currency')}</div>
          <div class="stat-label">Revenue</div>
        </div>
        <div class="stat">
          <div class="stat-value">${fmt(f['Cash Collected'], 'currency')}</div>
          <div class="stat-label">Cash</div>
        </div>
        <div class="stat">
          <div class="stat-value">${fmt(f['Close Rate %'], 'percent')}</div>
          <div class="stat-label">Close Rate</div>
        </div>
        <div class="stat">
          <div class="stat-value">${fmt(f['Calls Taken'], 'number')}</div>
          <div class="stat-label">Calls</div>
        </div>
      `;
      leaderboard.appendChild(entry);
    });
  }

  async function init() {
    try {
      allRecords = await fetchRecords();
      const weeks = getWeeks(allRecords);
      document.getElementById('loading').style.display = 'none';

      if (weeks.length === 0) {
        document.getElementById('empty').style.display = 'block';
        return;
      }

      currentWeek = weeks[0];
      renderWeekButtons(weeks);
      renderLeaderboard();
    } catch (e) {
      document.getElementById('loading').textContent = 'Failed to load. Please refresh.';
    }
  }

  init();
</script>
</body>
</html>
